<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>صحتي — المرجع الطبي</title>
  <meta name="description" content="مرجع طبي يعمل دون اتصال — إسعافات، أدوية، رعاية صحية">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob: 'unsafe-inline'; object-src 'none';">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="stylesheet" href="css/app.css">
  <link rel="icon" href="img/icon-192.png">
</head>
<body>
  <header id="app-header">
    <h1>صحتي</h1>
    <div id="search-bar">
      <input type="search" id="search-input" placeholder="بحث في المقالات والأدوية..." autocomplete="off">
      <button id="search-btn" aria-label="بحث">🔍</button>
    </div>
    <div id="header-right">
      <div id="content-version" class="content-version">v1.0</div>
      <button id="share-btn" class="header-btn" title="تصدير/استيراد">📁</button>
    </div>
  </header>

  <nav id="category-nav">
    <button class="category-btn active" data-category="all">الكل</button>
    <!-- categories populated dynamically -->
  </nav>

  <main id="main-content">
    <!-- Home view: category grid -->
    <section id="home-view" class="view active">
      <div id="category-grid"></div>
    </section>

    <!-- Article list view -->
    <section id="article-list-view" class="view">
      <button class="back-btn">← رجوع</button>
      <h2 id="article-list-title"></h2>
      <div id="article-list"></div>
    </section>

    <!-- Drug lookup view -->
    <section id="drug-lookup-view" class="view">
      <button class="back-btn">← رجوع</button>
      <h2>بحث في الأدوية</h2>
      <div id="drug-search-bar">
        <input type="search" id="drug-search-input" placeholder="ابحث بالاسم العربي أو الإنجليزي..." autocomplete="off">
      </div>
      <div id="drug-results"></div>
    </section>

    <!-- Reader view -->
    <section id="reader-view" class="view">
      <button class="back-btn">← رجوع</button>
      <article id="article-content"></article>
      <div id="article-meta">
        <div id="meta-reviewed"></div>
        <div id="meta-reviewer"></div>
      </div>
    </section>

    <!-- Search results view -->
    <section id="search-view" class="view">
      <h2>نتائج البحث</h2>
      <button class="back-btn">← رجوع</button>
      <div id="search-results"></div>
    </section>

    <!-- Share/import view -->
    <section id="share-view" class="view">
      <button class="back-btn">← رجوع</button>
      <h2>المشاركة والاستيراد</h2>
      <div id="share-panel">
        <div class="share-card">
          <h3>تصدير المحتوى</h3>
          <p>صدّر كل المحتوى الطبي كملف مضغوط لمشاركته عبر البلوتوث.</p>
          <button id="export-btn" class="share-btn">📤 تصدير المحتوى</button>
          <div id="export-status"></div>
        </div>
        <div class="share-card">
          <h3>استيراد المحتوى</h3>
          <p>استورد محتوى طبي من ملف استلمته عبر البلوتوث.</p>
          <input type="file" id="import-file" accept=".json,.json.gz,.gz" style="display:none">
          <button id="import-btn" class="share-btn">📥 استيراد من ملف</button>
          <div id="import-status"></div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div id="offline-indicator" class="offline-badge">يعمل دون اتصال</div>
  </footer>

  <script src="js/fuse.min.js"></script>
  <script src="js/marked.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
