<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#1a5632">
  <meta name="description" content="تطبيق سوداني يعمل دون اتصال — Sudan offline PWA">
  <link rel="manifest" href="manifest.json">
  <title>تطبيق سوداني</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app-layout">
    <!-- Sidebar nav placeholder — each app overrides these links -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="app-title" id="app-title">تطبيق سوداني</span>
      </div>
      <ul class="nav-list" id="nav-list">
        <!-- nav items injected by app -->
      </ul>
      <div class="sidebar-footer">
        <span id="update-status" class="update-status">جاهز</span>
      </div>
    </nav>

    <!-- Main content area -->
    <main id="content" class="content">
      <div id="view-container" class="view-container">
        <!-- views injected by app -->
        <div class="loading-placeholder">جارٍ التحميل…</div>
      </div>
    </main>
  </div>

  <!-- Core shared scripts (no bundle step; vanilla ES modules) -->
  <script type="module" src="verify-hash.js"></script>
  <script type="module" src="db.js"></script>
  <!-- app.js provided by each extending app -->
</body>
</html>
